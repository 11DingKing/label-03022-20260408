services:
  frontend-admin:
    build:
      context: ./frontend-admin
      dockerfile: Dockerfile
    ports:
      - "8081:80"
    restart: unless-stopped
    environment:
      - VITE_USE_MOCK=true
      - VITE_API_BASE_URL=/api
    networks:
      - app-network
